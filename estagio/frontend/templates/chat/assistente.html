{% extends "base.html" %}
{% block title %}Assistente{% endblock %}

{% block content %}
<div class="card chat-card">
  <div class="chat-header">Chat Bot</div>

  <div id="chat" class="chat-body">
    {% for m in thread %}
      <div class="bubble {% if m.role == 'user' %}user{% else %}bot{% endif %}">
        {{ m.text|linebreaksbr }}
      </div>
    {% endfor %}
  </div>
<div class="bubble bot"><strong style="opacity:.7">Como posso ajudar?</strong><br>{{ m.text|linebreaksbr }}</div>

  <form method="post" class="chat-inputbar">
    {% csrf_token %}
    <input type="text" name="msg" placeholder="Digite sua mensagem…" autocomplete="off" autofocus />
    <button class="btn-send" type="submit">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M22 2L11 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <path d="M22 2L14.5 22l-3.5-9.5L1.5 9.5 22 2z" stroke="currentColor" stroke-width="2" fill="currentColor"/>
      </svg>
      <span>Enviar</span>
    </button>
  </form>
</div>

<script>
  // rola pro fim sempre que abrir/voltar
  (function () {
    const el = document.getElementById('chat');
    if (el) el.scrollTop = el.scrollHeight;
  })();
</script>
{% endblock %}
